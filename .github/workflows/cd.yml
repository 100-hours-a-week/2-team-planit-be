name: CD - Multi ASG (Single LT Update + Refresh)

on:
  workflow_run:
    workflows: ["CI - Backend"]
    types: [completed]
    branches: [main]

jobs:
  lt-update:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    env:
      AWS_REGION: ap-northeast-2
      # LT를 알아내기 위한 "기준 ASG" 하나만 지정 (같은 LT를 쓰니까 아무거나 1개)
      BASE_ASG_NAME: planit-v2-asg-was
      USER_DATA_PATH: resources/user-data.sh

    outputs:
      lt_id: ${{ steps.lt.outputs.lt_id }}
      lt_version: ${{ steps.lt.outputs.lt_version }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACTIONS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACTIONS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: Compute image tag
        id: img
        shell: bash
        run: |
          set -euo pipefail
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT="${HEAD_SHA:0:7}"
          echo "tag=sha-${SHORT}" >> "$GITHUB_OUTPUT"

      - name: Render user-data with IMAGE_TAG
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.img.outputs.tag }}"
          test -f "$USER_DATA_PATH"
          sed "s|{{IMAGE_TAG}}|$TAG|g" "$USER_DATA_PATH" > rendered-userdata.sh
          base64 -w 0 rendered-userdata.sh > userdata.b64

      - name: Create new Launch Template version + set default (ONCE)
        id: lt
        shell: bash
        run: |
          set -euo pipefail

          ASG_JSON=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$BASE_ASG_NAME" \
            --query "AutoScalingGroups[0]" \
            --output json)

          LT_ID=$(echo "$ASG_JSON" | jq -r '
            .LaunchTemplate.LaunchTemplateId
            // .MixedInstancesPolicy.LaunchTemplate.LaunchTemplateSpecification.LaunchTemplateId
            // empty
          ')
          LT_NAME=$(echo "$ASG_JSON" | jq -r '
            .LaunchTemplate.LaunchTemplateName
            // .MixedInstancesPolicy.LaunchTemplate.LaunchTemplateSpecification.LaunchTemplateName
            // empty
          ')

          if [ -z "$LT_ID" ] && [ -n "$LT_NAME" ]; then
            LT_ID=$(aws ec2 describe-launch-templates \
              --launch-template-names "$LT_NAME" \
              --query "LaunchTemplates[0].LaunchTemplateId" \
              --output text)
          fi

          if [ -z "$LT_ID" ] || [ "$LT_ID" = "None" ]; then
            echo "❌ Launch Template not found from ASG: $BASE_ASG_NAME"
            echo "$ASG_JSON" | jq '{AutoScalingGroupName, LaunchTemplate, MixedInstancesPolicy, LaunchConfigurationName}'
            exit 1
          fi

          CURRENT=$(aws ec2 describe-launch-templates \
            --launch-template-ids "$LT_ID" \
            --query "LaunchTemplates[0].DefaultVersionNumber" \
            --output text)

          LT_DATA=$(jq -n --arg ud "$(cat userdata.b64)" '{UserData:$ud}')

          TAG="${{ steps.img.outputs.tag }}"
          NEW=$(aws ec2 create-launch-template-version \
            --launch-template-id "$LT_ID" \
            --source-version "$CURRENT" \
            --version-description "shared:${TAG} (${GITHUB_RUN_ID})" \
            --launch-template-data "$LT_DATA" \
            --query "LaunchTemplateVersion.VersionNumber" \
            --output text)

          aws ec2 modify-launch-template \
            --launch-template-id "$LT_ID" \
            --default-version "$NEW"

          echo "lt_id=$LT_ID" >> "$GITHUB_OUTPUT"
          echo "lt_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "LT default updated: $CURRENT -> $NEW (LT=$LT_ID)"

  refresh:
    runs-on: ubuntu-latest
    needs: lt-update

    strategy:
      fail-fast: false
      matrix:
        asg_name:
          - planit-v2-asg-was
          - planit-v2-asg-ws

    env:
      AWS_REGION: ap-northeast-2
      MIN_HEALTHY_PERCENT: "50"
      INSTANCE_WARMUP: "180"

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACTIONS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACTIONS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Start Instance Refresh
        id: refresh
        shell: bash
        run: |
          set -euo pipefail
          ASG_NAME="${{ matrix.asg_name }}"
          ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences "MinHealthyPercentage=${MIN_HEALTHY_PERCENT},InstanceWarmup=${INSTANCE_WARMUP}" \
            --query "InstanceRefreshId" \
            --output text)
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "Started refresh $ID (ASG=$ASG_NAME)"

      - name: Monitor Instance Refresh
        shell: bash
        run: |
          set -euo pipefail
          ASG_NAME="${{ matrix.asg_name }}"
          ID="${{ steps.refresh.outputs.id }}"
          for i in {1..90}; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$ID" \
              --query "InstanceRefreshes[0].Status" \
              --output text)
            echo "ASG=$ASG_NAME Status: $STATUS"
            if [ "$STATUS" = "Successful" ]; then exit 0; fi
            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then exit 1; fi
            sleep 20
          done
          echo "Timeout"
          exit 1

      - name: Cancel Instance Refresh on failure/timeout
        if: always() && steps.refresh.outputs.id != '' && (failure() || cancelled())
        shell: bash
        run: |
          set -euo pipefail
          ASG_NAME="${{ matrix.asg_name }}"
          echo "Cancelling instance refresh (ASG=$ASG_NAME)"
          aws autoscaling cancel-instance-refresh --auto-scaling-group-name "$ASG_NAME"

      - name: Send Discord Notification
        if: failure()
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"CD - Backend(ASG) 실패\n🔗 ${RUN_URL}\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}