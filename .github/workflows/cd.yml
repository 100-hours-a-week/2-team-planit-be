name: CD - Backend

on:
  workflow_run:
    workflows: ["CI - Backend"]
    types:
      - completed
    branches: [main]

jobs:
  backend-cd:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }} # CI가 성공했을 때만 실행

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image tags
        id: tags
        run: |
          TIMESTAMP=$(date -u +%Y%m%d-%H%M)
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "timestamp=${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "timestamp_tag=${TIMESTAMP}" >> "$GITHUB_OUTPUT"
          echo "commit_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # GitHub Actions IP를 AWS SG에 일시적으로 등록하기
      - name: Get GitHub Actions IP
        id: get-ip
        uses: haythem/public-ip@v1.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACTIONS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACTIONS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Add IP to Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get-ip.outputs.ipv4 }}/32 \
            || echo "IP may already be in security group"
          sleep 10

      - name: Ensure ECR repository exists
        run: |
          aws ecr create-repository --repository-name planit-was --region ap-northeast-2 \
            || echo "Repository planit-was already exists"

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/planit-was:${{ steps.tags.outputs.timestamp_tag }}
            ${{ steps.ecr-login.outputs.registry }}/planit-was:${{ steps.tags.outputs.commit_tag }}
            ${{ steps.ecr-login.outputs.registry }}/planit-was:prod

      - name: Deploy to EC2 (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            REGION="ap-northeast-2"
            ACCOUNT_ID="713881824287"
            REPO_URI="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com"
            APP_DIR="/opt/planit"

            cd "${APP_DIR}"

            # S3(Presigned URL 등)를 위한 AWS 자격증명 export (compose의 ${VAR} 치환에 사용)
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_S3_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}"
            export AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}"
            export AWS_REGION="ap-northeast-2"
            export CLOUDFRONT_DOMAIN="${{ secrets.CLOUDFRONT_DOMAIN }}"

            # ECR 로그인 (인스턴스 IAM 역할 사용)
            aws ecr get-login-password --region "${REGION}" \
              | docker login --username AWS --password-stdin "${REPO_URI}"

            # docker-compose.yml의 이미지 태그를 prod로 통일 (latest → prod)
            sudo sed -i "s|planit-was:latest|planit-was:prod|g" docker-compose.yml

            # 앱 이미지만 pull 후 재기동
            docker compose pull app
            docker compose up -d app

            echo "Health Check 시작"
            for retry in $(seq 1 15); do
              response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health || true)
              if [ "$response" = "200" ] || [ "$response" = "401" ]; then
                echo "Server is up (HTTP $response)"
                exit 0 # 성공 종료
              fi
            
              echo "Waiting for server... (Attempt $retry/15)"
              sleep 10
            done
            echo "Server failed to start."
            exit 1 # 실패 종료

      - name: Configure AWS credentials for cleanup
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACTIONS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACTIONS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Remove IP from Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get-ip.outputs.ipv4 }}/32 \
            || echo "Failed to remove IP or rule not found"

      - name: Send Discord Notification
        if: failure()
        run: |
          MSG="🔴 CD - Backend 실패!"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"${MSG}\n🔗 [배포 로그 확인](${RUN_URL})\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}