name: Rollback - Backend

on:
  workflow_dispatch:  # 수동 실행

jobs:
  backend-rollback:
    runs-on: ubuntu-latest
    
    steps:
      - name: Find last successful CD run
        id: find_cd
        run: |
          RUN_JSON=$(gh run list --workflow "CD - Backend" --status success --limit 1 --json databaseId,headSha)
          HEAD_SHA=$(echo "$RUN_JSON" | jq -r '.[0].headSha')
          RUN_ID=$(echo "$RUN_JSON" | jq -r '.[0].databaseId')
          if [ -z "$HEAD_SHA" ] || [ "$HEAD_SHA" = "null" ]; then
            echo "성공한 CD 실행 이력을 찾을 수 없습니다."
            exit 1
          fi
          SHORT_SHA="${HEAD_SHA:0:7}"
          ROLLBACK_TAG="sha-${SHORT_SHA}"
          echo "rollback_tag=${ROLLBACK_TAG}" >> "$GITHUB_OUTPUT"
          echo "run_url=$(gh run view $RUN_ID --json url -q .url)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get GitHub Actions IP
        id: get-ip
        uses: haythem/public-ip@v1.3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACTIONS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACTIONS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Add IP to Security Group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get-ip.outputs.ipv4 }}/32 \
            || echo "IP may already be in security group"
          sleep 10

      - name: Deploy to EC2 (Rollback)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            ROLLBACK_TAG="${{ steps.find_cd.outputs.rollback_tag }}"
            REGION="ap-northeast-2"
            ACCOUNT_ID="713881824287"
            REPO_URI="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com"
            APP_IMAGE="${REPO_URI}/planit-was:${ROLLBACK_TAG}"
            APP_DIR="/opt/planit"

            cd "${APP_DIR}"

            # S3(Presigned URL 등)를 위한 AWS 자격증명 export (compose의 ${VAR} 치환에 사용)
            export AWS_ACCESS_KEY_ID="${{ secrets.AWS_S3_ACCESS_KEY_ID }}"
            export AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}"
            export AWS_S3_BUCKET="${{ secrets.AWS_S3_BUCKET }}"
            export AWS_REGION="ap-northeast-2"
            export CLOUDFRONT_DOMAIN="${{ secrets.CLOUDFRONT_DOMAIN }}"

            # ECR 로그인
            aws ecr get-login-password --region "${REGION}" \
              | docker login --username AWS --password-stdin "${REPO_URI}"

            # docker-compose.yml의 app 이미지를 롤백 태그로 교체
            sudo sed -i "s|planit-was:[a-zA-Z0-9._-]*|planit-was:${ROLLBACK_TAG}|g" docker-compose.yml

            # 앱 이미지 pull 후 재기동
            docker compose pull app
            docker compose up -d app

            echo "Health Check 시작 (롤백 대상: ${ROLLBACK_TAG})"
            for retry in $(seq 1 15); do
              response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/health || true)
              if [ "$response" = "200" ] || [ "$response" = "401" ]; then
                echo "Server is up (HTTP $response)"
                exit 0
              fi
              echo "Waiting for server... (Attempt $retry/15)"
              sleep 10
            done
            echo "Server failed to start."
            exit 1

      - name: Configure AWS credentials for cleanup
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACTIONS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ACTIONS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Remove IP from Security Group
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr ${{ steps.get-ip.outputs.ipv4 }}/32 \
            || echo "Failed to remove IP or rule not found"

      - name: Send Discord Notification
        if: always()
        run: |
          STATUS="${{ job.status }}"
          TAG="${{ steps.find_cd.outputs.rollback_tag }}"
          if [ "$STATUS" = "success" ]; then
            MSG="Rollback - Backend 성공 (태그: ${TAG})"
          else
            MSG="🔴 Rollback - Backend 실패 (태그: ${TAG})"
          fi
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"${MSG}\n🔗 [로그 확인](${RUN_URL})\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
