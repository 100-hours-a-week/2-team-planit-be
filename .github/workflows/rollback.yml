name: Rollback - Backend (Auto Previous LT + Refresh)

on:
  workflow_dispatch: {}

jobs:
  rollback:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ap-northeast-2
      ASG_NAME: planit-v2-asg-backend
      MIN_HEALTHY_PERCENT: "50"
      INSTANCE_WARMUP: "180"

    steps:
      - name: Configure AWS credentials (Access Key)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install jq
        run: sudo apt-get update -y && sudo apt-get install -y jq

      - name: Resolve Launch Template ID from ASG
        id: lt
        shell: bash
        run: |
          set -euo pipefail
          LT_ID=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$ASG_NAME" \
            --query "AutoScalingGroups[0].LaunchTemplate.LaunchTemplateId" \
            --output text)

          if [ -z "$LT_ID" ] || [ "$LT_ID" = "None" ]; then
            echo "Failed to resolve LaunchTemplateId from ASG."
            exit 1
          fi

          echo "lt_id=$LT_ID" >> "$GITHUB_OUTPUT"
          echo "LaunchTemplateId=$LT_ID"

      - name: Set Launch Template default to previous version
        id: set
        shell: bash
        run: |
          set -euo pipefail
          LT_ID="${{ steps.lt.outputs.lt_id }}"

          CURRENT=$(aws ec2 describe-launch-templates \
            --launch-template-ids "$LT_ID" \
            --query "LaunchTemplates[0].DefaultVersionNumber" \
            --output text)

          if ! [[ "$CURRENT" =~ ^[0-9]+$ ]]; then
            echo "Could not read current default version: $CURRENT"
            exit 1
          fi

          PREV=$((CURRENT - 1))
          if [ "$PREV" -lt 1 ]; then
            echo "No previous version available (current=$CURRENT)"
            exit 1
          fi

          aws ec2 modify-launch-template \
            --launch-template-id "$LT_ID" \
            --default-version "$PREV"

          echo "from=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "to=$PREV" >> "$GITHUB_OUTPUT"
          echo "LT default updated: $CURRENT -> $PREV"

      - name: Start Instance Refresh (rollback)
        id: refresh
        shell: bash
        run: |
          set -euo pipefail
          ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences "MinHealthyPercentage=${MIN_HEALTHY_PERCENT},InstanceWarmup=${INSTANCE_WARMUP}" \
            --query "InstanceRefreshId" \
            --output text)

          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "Started rollback refresh $ID"

      - name: Monitor Instance Refresh (rollback)
        shell: bash
        run: |
          set -euo pipefail
          ID="${{ steps.refresh.outputs.id }}"

          for i in {1..90}; do
            out="$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$ID" \
              --query "InstanceRefreshes[0].{Status:Status,PercentageComplete:PercentageComplete,StatusReason:StatusReason}" \
              --output json)"

            status="$(echo "$out" | jq -r .Status)"
            pct="$(echo "$out" | jq -r .PercentageComplete)"
            reason="$(echo "$out" | jq -r .StatusReason)"

            echo "[$i] status=$status pct=$pct reason=$reason"

            if [ "$status" = "Successful" ]; then exit 0; fi
            if [ "$status" = "Failed" ] || [ "$status" = "Cancelled" ]; then exit 1; fi

            sleep 20
          done

          echo "Timeout"
          exit 1