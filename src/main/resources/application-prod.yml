spring:
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:localpass}
      timeout: 2s # Production 환경 Spring Boot 설정 루트
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
  datasource: # 배포용 데이터베이스 접속 정보 (cd.yml에서 secrets.SPRING_DATASOURCE_* 주입)
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    show-sql: false

jwt: # cd.yml에서 secrets.JWT_SECRET 주입
  secret: ${JWT_SECRET}
  access-token-expiration-ms: 86400000

cloud:
  aws: # cd.yml에서 secrets.AWS_S3_*, secrets.CLOUDFRONT_DOMAIN 주입
    enabled: true
    s3:
      bucket: ${AWS_S3_BUCKET}
    region:
      static: ${AWS_REGION:ap-northeast-2}

storage:
  mode: s3
planit:
  cloudfront: # cd.yml에서 secrets.CLOUDFRONT_DOMAIN 주입
    domain: ${CLOUDFRONT_DOMAIN}
  profile:
    default-image-url: https://${planit.cloudfront.domain}/profile/default-profile.png

ai:
  base-url: ${AI_BASE_URL:http://10.0.1.92:8000}
  mock-enabled: false

google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY}

app:
  redis:
    stream:
      aiJobsKey: stream:ai-jobs
      aiJobsGroup: ai-workers
      aiResultsKey: stream:itinerary-results
  itinerary:
    jobTtlSeconds: 86400
    consumerGroup: travel-service
    consumerName: ${HOSTNAME:prod}-${random.uuid}
    streamEnabled: true

trip:
  create-window-enabled: true # 운영환경에서는 시간 제한 활성화
